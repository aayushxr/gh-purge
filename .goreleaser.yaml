version: 2

project_name: gh-purge

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/gh-purge
    binary: gh-purge
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: binary
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: Aayush-Rajagopalan
    name: gh-purge
  draft: false
  prerelease: auto
